name: 'Validate Push and Pull Request'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install Project Dependencies
        run: npm ci
      - name: Install Global Dependencies
        run: npm i -g @salesforce/cli
      - name: Install Code Analyzer
        run: sf plugins install code-analyzer@5.13.0
      - name: Check Apex Formatting
        run: npm run prettier:apex:check
      - name: Run Code Analyzer
        run: npm run sfca:check
      - name: Create Auth File
        run: echo ${{ secrets.SF_DEV_HUB_AUTH_URL }} > authFile
      - name: Authorize DevHub
        run: sf org login sfdx-url -f authFile -d
      - name: Create Scratch Org
        id: create_scratch_org
        run: sf org create scratch -e developer -d -a TestOrg -y 1 -w 30
      - name: Deploy Metadata and Run Apex Tests
        run: >-
          sf project deploy start
          --target-org TestOrg
          --source-dir sfdx-source/apex-di
          --test-level RunSpecifiedTests
          --tests DiTest
          --wait 30
          --json > deploy-result.json
      - name: Enforce Exact Di Coverage
        run: npm run coverage:check
      - name: Delete Scratch Org
        if: always() && steps.create_scratch_org.outcome == 'success'
        run: sf org delete scratch -o TestOrg -p
      - name: Delete Auth File
        if: always()
        run: rm authFile
